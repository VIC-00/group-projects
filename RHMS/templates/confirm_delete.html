{% extends 'base.html' %}
{% block content %}
<div class="page-content active">
    <div class="card" style="max-width: 500px; margin: 50px auto; text-align: center; border-top: 5px solid #e74c3c;">
        <div class="card-header">
            <h2 style="color: #e74c3c;"> Confirm Deletion</h2>
        </div>
        <div class="card-body">
            <p>Are you sure you want to delete <strong>{{ obj }}</strong>?</p>
            <p style="font-size: 0.9em; color: #666; margin-bottom: 25px;">
                This action cannot be undone and will permanently remove this {{ type }} from the system.
            </p>
            
            <form method="POST">
                {% csrf_token %}
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button type="submit" class="btn" style="background: #e74c3c; color: white; padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer;">Yes, Delete Permanently</button>
                    <a href="{{ back_url }}" class="btn btn-secondary" style="text-decoration: none; padding: 10px 25px;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
