{% extends 'base.html' %}

{% block content %}
<div class="page-content active">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header"><h2>Bulk Import Properties</h2></div>
        <div class="card-body">
            <p style="margin-bottom: 20px; color: var(--text-secondary);">
                Upload a CSV file with the following columns: <strong>name, location, total_units, monthly_revenue</strong>.
            </p>
            
            <form method="POST" enctype="multipart/form-data" action="{% url 'import_properties' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label>Select CSV File</label>
                    <input type="file" name="csv_file" accept=".csv" required 
                           style="border: 1px dashed var(--border-color); padding: 20px; width: 100%;">
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <a href="{% url 'properties' %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Start Import</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
