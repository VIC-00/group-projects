{% extends 'base.html' %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div style="width: 100%; max-width: 450px; background: var(--bg-primary); border-radius: 12px; border: 1px solid var(--border-color); padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="background: rgba(52, 152, 219, 0.1); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                <span style="font-size: 2rem;">🔐</span>
            </div>
            <h2 style="font-family: 'Playfair Display', serif; margin: 0; color: #fff; font-size: 1.6rem;">Update Password</h2>
            <p style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 8px; line-height: 1.4;">
                To keep your account safe, please replace your phone number with a secure password.
            </p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            {% for field in form %}
            <div style="margin-bottom: 18px; position: relative;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">
                    {{ field.label }}
                </label>
                <div class="custom-input-group" style="position: relative;">
                    {{ field }}
                    <span class="toggle-password" onclick="togglePasswordVisibility('{{ field.id_for_label }}')" 
                          style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-secondary); font-size: 1.1rem; z-index: 10;">
                        👁️
                    </span>
                </div>
                {% if field.errors %}
                    <div style="color: #e74c3c; font-size: 0.75rem; margin-top: 6px; font-weight: 600;">
                        {{ field.errors.0 }}
                    </div>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" style="width: 100%; padding: 14px; border-radius: 8px; background: #3498db; color: white; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; margin-top: 15px; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);">
                Save & Continue to Dashboard
            </button>
        </form>
    </div>
</div>

<style>
    /* Styling the Django inputs */
    .custom-input-group input {
        width: 100%;
        padding: 12px 45px 12px 15px; /* Extra right padding for the eye icon */
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background: var(--bg-secondary);
        color: white;
        font-family: inherit;
        font-size: 0.95rem;
        box-sizing: border-box;
        transition: 0.2s;
    }

    .custom-input-group input:focus {
        border-color: #3498db;
        outline: none;
        background: rgba(255,255,255,0.03);
    }

    /* Button Hover State */
    button[type="submit"]:hover {
        background: #2980b9;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
    }
</style>

<script>
    function togglePasswordVisibility(fieldId) {
        const passwordInput = document.getElementById(fieldId);
        const toggleIcon = passwordInput.nextElementSibling;
        
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            toggleIcon.textContent = "🙈";
        } else {
            passwordInput.type = "password";
            toggleIcon.textContent = "👁️";
        }
    }
</script>
{% endblock %}
