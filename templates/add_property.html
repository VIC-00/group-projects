{% extends 'base.html' %}

{% block content %}
<div class="page-content active">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header">
            <h2>🏠 Add New Property</h2>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                
                {% for field in form %}
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display:block; margin-bottom:5px; font-weight:600;">{{ field.label }}</label>
                    <div class="auth-field">
                        {{ field }}
                    </div>
                    {% if field.errors %}
                        <p style="color:red; font-size:12px;">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
                {% endfor %}

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">Save Property</button>
                    <a href="{% url 'properties' %}" class="btn btn-secondary" style="text-decoration: none; text-align: center;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
