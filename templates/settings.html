{% extends 'base.html' %}

{% block content %}
<div id="settingsPage" class="page-content active">
    <div class="quick-actions" style="margin-bottom: 20px;">
        <h2 style="margin: 0;">System Settings</h2>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px;">
        
        <div class="card">
            <div class="card-header">
                <h2 style="margin: 0;">Profile Settings</h2>
            </div>
            <div class="card-body">
                <form method="POST" action="{% url 'settings' %}">
                    {% csrf_token %}
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="font-weight:600; display:block; margin-bottom:5px;">First Name</label>
                        <input type="text" name="first_name" value="{{ request.user.first_name }}" style="padding:7px 12px; width:100%; border:1px solid var(--input-border); border-radius:6px; background:var(--input-bg); color:var(--text-primary);">
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="font-weight:600; display:block; margin-bottom:5px;">Last Name</label>
                        <input type="text" name="last_name" value="{{ request.user.last_name }}" style="padding:7px 12px; width:100%; border:1px solid var(--input-border); border-radius:6px; background:var(--input-bg); color:var(--text-primary);">
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="font-weight:600; display:block; margin-bottom:5px;">Administrator Email</label>
                        <input type="email" name="email" value="{{ request.user.email }}" style="padding:7px 12px; width:100%; border:1px solid var(--input-border); border-radius:6px; background:var(--input-bg); color:var(--text-primary);">
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label style="font-weight:600; display:block; margin-bottom:5px;">Phone Number</label>
                        <input type="tel" name="phone_number" value="{{ request.user.phone_number }}" style="padding:7px 12px; width:100%; border:1px solid var(--input-border); border-radius:6px; background:var(--input-bg); color:var(--text-primary);">
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            </div>
        </div>

        <div class="card" style="height: fit-content;">
            <div class="card-header">
                <h2 style="margin: 0;">Appearance</h2>
            </div>
            <div class="card-body">
                <div class="theme-toggle-container" style="display: flex; align-items: center; gap: 10px;">
                    <span class="theme-icon">🌙</span>
                    <span class="theme-toggle-label" style="font-weight: 600;">Dark Mode</span>
                    <label class="theme-toggle-switch">
                        <input type="checkbox" id="themeToggle">
                        <span class="theme-slider"></span>
                    </label>
                    <span class="theme-icon">☀️</span>
                </div>
                <p style="font-size:13px; color:var(--text-secondary); margin-top: 15px;">
                    Toggle between light and dark themes for comfortable viewing.
                </p>
            </div>
        </div>

    </div>
</div>
{% endblock %}
